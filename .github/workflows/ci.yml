name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Authenticate as GitHub App
        id: auth
        if: ${{ secrets.AUTOMATION_GITHUB_APP_ID != '' }}
        uses: ./.github/actions/github-app-auth
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Lint (auto-fix)
        id: lint
        if: ${{ secrets.AUTOMATION_GITHUB_APP_ID != '' }}
        uses: ./.github/actions/lint-files
        with:
          fix: 'true'
        continue-on-error: true

      - name: Auto-commit lint fixes
        if: steps.lint.outputs.changed-or-failed == 'true' && !cancelled()
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: auto-fix lint issues'

      - name: Fail if lint had errors or changes
        if: steps.lint.outputs.changed-or-failed == 'true' && !cancelled()
        run: |
          echo "Lint auto-fix committed changes or errors remain."
          exit 1

      - name: Lint (check only)
        if: ${{ secrets.AUTOMATION_GITHUB_APP_ID == '' }}
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
