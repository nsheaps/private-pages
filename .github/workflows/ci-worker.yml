name: 'CI: CORS Proxy Worker'

on:
  push:
    branches: ['*']
    paths:
      - 'workers/cors-proxy/**'
      - '.github/workflows/ci-worker.yml'
  pull_request:
    branches: [main]
    paths:
      - 'workers/cors-proxy/**'
      - '.github/workflows/ci-worker.yml'

concurrency:
  group: ci-worker-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: workers/cors-proxy

jobs:
  validate:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  build:
    name: Build (dry-run deploy)
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Dry-run deploy
        run: npm run build
