<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Pages - Auth Callback</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0d1117;
      color: #c9d1d9;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    .error { color: #f85149; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <p id="status">Completing sign-in&hellip;</p>
    <p id="error" class="error" hidden></p>
  </div>
  <script>
    (async function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var returnedState = params.get('state');

      if (!code || !returnedState) {
        showError('Missing code or state parameter. Please try signing in again.');
        return;
      }

      var storedState = sessionStorage.getItem('pp_pkce_state');
      var verifier = sessionStorage.getItem('pp_pkce_verifier');
      var clientId = sessionStorage.getItem('pp_pkce_client_id');
      var redirectUri = sessionStorage.getItem('pp_pkce_redirect_uri');
      var returnUrl = sessionStorage.getItem('pp_pkce_return_url');
      var corsProxy = sessionStorage.getItem('pp_pkce_cors_proxy');

      if (!storedState || !verifier || !clientId || !returnUrl) {
        showError(
          'Missing session data. This can happen if you opened this link ' +
          'in a different tab. Please return to the app and try signing in again.'
        );
        return;
      }

      if (returnedState !== storedState) {
        showError('State mismatch. Please try signing in again.');
        return;
      }

      // Exchange the authorization code for an access token
      try {
        var body = new URLSearchParams({
          client_id: clientId,
          code: code,
          code_verifier: verifier,
        });
        if (redirectUri) {
          body.set('redirect_uri', redirectUri);
        }

        var tokenUrl = 'https://github.com/login/oauth/access_token';
        if (corsProxy) {
          var proxy = corsProxy.replace(/\/+$/, '');
          tokenUrl = proxy + '/' + tokenUrl.replace(/^https?:\/\//, '');
        }

        var response = await fetch(tokenUrl, {
          method: 'POST',
          headers: { Accept: 'application/json' },
          body: body,
        });

        if (!response.ok) {
          showError('Token exchange failed: ' + response.status + ' ' + response.statusText);
          return;
        }

        var data = await response.json();

        if (data.error) {
          showError(data.error_description || ('Token exchange error: ' + data.error));
          return;
        }

        // Store the token result for the app to pick up
        sessionStorage.setItem('pp_pkce_token_result', JSON.stringify({
          access_token: data.access_token,
          token_type: data.token_type,
          scope: data.scope,
        }));
      } catch (err) {
        var hint = corsProxy
          ? 'The CORS proxy may not support POST requests. Try a different proxy or use PAT authentication.'
          : 'GitHub\'s OAuth endpoints do not support browser requests (CORS). Configure a CORS proxy that supports POST, or use PAT authentication instead.';
        showError('Token exchange failed: ' + (err.message || 'network error') + '. ' + hint);
        return;
      }

      // Clean up PKCE session data
      sessionStorage.removeItem('pp_pkce_state');
      sessionStorage.removeItem('pp_pkce_verifier');
      sessionStorage.removeItem('pp_pkce_client_id');
      sessionStorage.removeItem('pp_pkce_redirect_uri');
      sessionStorage.removeItem('pp_pkce_return_url');
      sessionStorage.removeItem('pp_pkce_cors_proxy');

      // Redirect back to the originating deployment
      window.location.replace(returnUrl);

      function showError(msg) {
        document.getElementById('status').hidden = true;
        var el = document.getElementById('error');
        el.textContent = msg;
        el.hidden = false;
      }
    })();
  </script>
</body>
</html>
